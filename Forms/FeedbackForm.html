<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    .form-bg{
        background-image: url(/Forms/images/pexels-joshuamiranda-6298412.jpg);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }
</style>  
</head>
  <body>
    <section class="form-bg">
    <div class="container-fluid py-5 ">
        <div class="row">
            <div class=" col-lg-5 col-md-6 ms-auto me-5">
                <div class="card  border-0 p-4 bg-transparent ">
                    <div class="card-header bg-primary text-white text-center py-3 mb-3">
                        <h2>Feedback-Form</h2>
                    </div>
                    <div class="card-body p-4">

                        <form>

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" placeholder="Enter your full name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="Enter your email address" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" placeholder="Enter mobile number">
                            </div>
                             
                            <div class="mb-3">
                                <label class="form-label d-block">Gender</label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender">
                                    <label class="form-check-label">Male</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender">
                                    <label class="form-check-label">Female</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender">
                                    <label class="form-check-label">Other</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rate Our Service"</label>

                                <select class="form-select">
                                    <option selected disabled>Select rating</option>
                                    <option>⭐⭐⭐⭐⭐ Excellent</option>
                                    <option>⭐⭐⭐⭐ Very Good</option>
                                    <option>⭐⭐⭐ Good</option>
                                    <option>⭐⭐ Average</option>
                                    <option>⭐ Poor</option>
                                </select>
                            </div>
                               
                            
                              <div class="mb-3">
                                <label class="form-label">Your Feedback</label>

                                <textarea class="form-control" rows="5" placeholder="Write your feedback here..." required></textarea>
                            </div>
                    
                            <div class="d-grid">
                                <button class="btn btn-primary btn-lg">
                                    Submit
                                </button>
                            </div>
  
                        </form>
                        <div class="card-footer text-center text-muted">
                        <i class="bi bi-emoji-smile"></i>Thank you for helping us improve!
                    </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
