<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tour Booking</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: url("/Forms/images/tour.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
      }

      .card {
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;

        overflow: hidden;
      }

      .card-header {
        background: rgba(0, 119, 182, 0.75);
        color: white;
        border-bottom: none;
      }

      .card-body {
        padding: 30px;
      }

      .form-label {
        color: white;
        font-weight: 600;
      }

      .form-control,
      .form-select {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .form-control::placeholder {
        color: #f1f1f1;
      }

      .form-control,
      .form-select {
        color: white;
      }

      .form-select option {
        color: black;
      }

      .input-group-text {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .btn-primary {
        background: #ff7a00;
        border: none;
        border-radius: 30px;
      }

      .btn-primary:hover {
        background: #e56d00;
      }

      .card-footer {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-end align-items-center min-vh-100">
        <div class="col-lg-5 me-5">
          <div class="card shadow-lg">
            <div class="card-header">
              <h2><i class="bi bi-airplane-fill"></i> Book Your Dream Tour</h2>

              <p class="mb-0">Explore the World with Infinity Journeys</p>
            </div>

            <div class="card-body bg-transparent">
              <form>
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>

                    <div class="input-group">
                      <span class="input-group-text">
                        <i class="bi bi-person-fill"></i>
                      </span>

                      <input
                        type="text"
                        class="form-control"
                        placeholder="Enter Name"
                      />
                    </div>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Mobile</label>

                    <div class="input-group">
                      <span class="input-group-text">
                        <i class="bi bi-telephone-fill"></i>
                      </span>

                      <input
                        type="tel"
                        class="form-control"
                        placeholder="Mobile Number"
                      />
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Email Address</label>

                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-envelope-fill"></i>
                    </span>

                    <input
                      type="email"
                      class="form-control"
                      placeholder="Enter Email"
                    />
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Destination</label>

                    <div class="input-group">
                      <span class="input-group-text">
                        <i class="bi bi-geo-alt-fill"></i>
                      </span>

                      <select class="form-select">
                        <option>Select Destination</option>
                        <option>Goa</option>
                        <option>Manali</option>
                        <option>Kashmir</option>
                        <option>Kerala</option>
                        <option>Dubai</option>
                        <option>Maldives</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Package</label>

                    <div class="input-group">
                      <span class="input-group-text">
                        <i class="bi bi-briefcase-fill"></i>
                      </span>

                      <select class="form-select">
                        <option>Select Package</option>
                        <option>Silver</option>
                        <option>Gold</option>
                        <option>Platinum</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Travel Date</label>

                    <div class="input-group">
                      <span class="input-group-text">
                        <i class="bi bi-calendar-event-fill"></i>
                      </span>

                      <input type="date" class="form-control" />
                    </div>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Travelers</label>

                    <div class="input-group">
                      <span class="input-group-text">
                        <i class="bi bi-people-fill"></i>
                      </span>

                      <input
                        type="number"
                        class="form-control"
                        placeholder="No. of Travelers"
                      />
                    </div>
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label">Special Request</label>

                  <textarea
                    class="form-control"
                    rows="3"
                    placeholder="Write your message"
                  ></textarea>
                </div>

                <div class="d-grid">
                  <button class="btn btn-primary btn-lg">
                    <i class="bi bi-ticket-perforated-fill"></i>

                    Confirm Booking
                  </button>
                </div>
              </form>
            </div>

            <div class="card-footer text-center">
              <i class="bi bi-airplane-engines"></i>

              Your Journey Begins Here
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
