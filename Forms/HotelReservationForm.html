<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hotel Reservation Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url(/Forms/images/pexels-skyler-ewing-266953-15925412.jpg);
            background-size: cover;
         background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .card{
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            color: white;
            border-radius: 15px;
        }
        .form-label{
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-start">

        <div class="col-lg-5 col-md-6">

            <div class="card shadow-lg bg-transparent border-0">

                <!-- Card Header -->
                <div class="card-header  text-primary text-center py-3">
                    <h2 class="mb-0">Hotel Reservation</h2>
                </div>

                <!-- Card Body -->
                <div class="card-body p-4">

                    <form>

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="Enter your name">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter your email">
                        </div>

                        <!-- Check In & Check Out -->
                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Check In</label>
                                <input type="date" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Check Out</label>
                                <input type="date" class="form-control">
                            </div>

                        </div>

                        <!-- Room Type -->
                        <div class="mb-3">
                            <label class="form-label">Room Type</label>

                            <select class="form-select">
                                <option selected disabled>Select Room</option>
                                <option>Standard Room</option>
                                <option>Deluxe Room</option>
                                <option>Luxury Suite</option>
                            </select>
                        </div>

                        <!-- Number of Guests -->
                        <div class="mb-3">
                            <label class="form-label">Number of Guests</label>
                            <input type="number" class="form-control" placeholder="Enter number of guests">
                        </div>

                        <!-- Special Request -->
                        <div class="mb-4">
                            <label class="form-label">Special Request</label>
                            <textarea class="form-control" rows="3" placeholder="Write your request"></textarea>
                        </div>

                        <!-- Button -->
                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg">
                                Book Now
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
