<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShopNest</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>

<nav class="navbar navbar-expand-lg bg-secondary shadow-sm">

<div class="container">

    
    <a class="navbar-brand fw-bold fs-3 text-danger-emphasis" href="#">
        <i class="bi bi-bag-heart-fill me-2"></i>ShopNest
    </a>


    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbar">

        <span class="navbar-toggler-icon"></span>

    </button>


    <div class="collapse navbar-collapse" id="navbar">

        
        <ul class="navbar-nav ms-4">

            <li class="nav-item">
                <a class="nav-link active" href="#">Home</a>
            </li>

            <li class="nav-item dropdown">

                <a class="nav-link dropdown-toggle"
                   href="#"
                   data-bs-toggle="dropdown">

                    Categories

                </a>

                <ul class="dropdown-menu">

                    <li><a class="dropdown-item" href="#">Electronics</a></li>

                    <li><a class="dropdown-item" href="#">Fashion</a></li>

                    <li><a class="dropdown-item" href="#">Furniture</a></li>

                    <li><a class="dropdown-item" href="#">Beauty</a></li>

                    <li><a class="dropdown-item" href="#">Sports</a></li>

                </ul>

            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Deals</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">New Arrivals</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Contact</a>
            </li>

        </ul>

        
        <form class="d-flex ms-auto me-3" role="search">

            <input class="form-control me-2"
                   type="search"
                   placeholder="Search Products">

            <button class="btn btn-primary" type="submit">
                <i class="bi bi-search"></i>
            </button>

        </form>

        
        <div class="d-flex align-items-center gap-3">

            <a href="#" class="text-dark fs-5">
                <i class="bi bi-heart"></i>
            </a>

            <a href="#" class="text-dark fs-5 position-relative">
                <i class="bi bi-cart3"></i>

                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    3
                </span>
            </a>

            <button class="btn btn-outline-primary">
                <i class="bi bi-person-circle me-1"></i>
                Login
            </button>

        </div>

    </div>

</div>

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
