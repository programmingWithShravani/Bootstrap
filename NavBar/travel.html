<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Infinity Journeys</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="#">
          <img
            src="/NavBar/image/journey-removebg-preview.png"
            alt="Infinity Journeys"
            height="80"
            width="200"
          />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown"
              >
                Destinations
              </a>

              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">India</a></li>

                <li><a class="dropdown-item" href="#">Dubai</a></li>

                <li><a class="dropdown-item" href="#">Maldives</a></li>

                <li><a class="dropdown-item" href="#">Europe</a></li>
              </ul>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Packages</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Gallery</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Blog</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Contact</a>
            </li>
          </ul>

          <form class="d-flex me-3">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search Tour"
            />

            <button class="btn btn-light">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <button class="btn btn-warning">
            <i class="bi bi-geo-alt-fill me-1"></i>
            Book Now
          </button>
        </div>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
