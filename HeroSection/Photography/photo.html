    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="#">
          <i class="bi bi-camera-fill text-warning"></i> PHOTO
        </a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >

        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Gallery</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Portfolio</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>

            <li class="nav-item">

          </ul>

          <i class="bi bi-instagram text-white fs-4"></i>

    <section class="hero">

        <div class="row align-items-center min-vh-100">
          <div class="col-lg-6 text-white">
            <p class="text-warning letter-spacing">PROFESSIONAL PHOTOGRAPHY</p>

            <h1 class="display-1 fw-bold">

            </h1>

            <p class="lead my-4">
              We create timeless memories with creative photography and
              cinematic storytelling.
            </p>

            <a href="#" class="btn btn-warning px-4 py-2 me-3">
              <i class="bi bi-camera-fill"></i>
              View Gallery
            </a>

            <a href="#" class="btn btn-outline-light px-4 py-2"> Book Shoot </a>
          </div>

          <div class="col-lg-6 text-center">
          </div>
        </div>
      </div>
      

      <div class="scroll-down">
        <i class="bi bi-mouse"></i>

        <p>Scroll</p>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
