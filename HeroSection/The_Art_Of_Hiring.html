<!doctype html>

    <title>Bootstrap demo</title>

<link rel="stylesheet"

            data-bs-target="#menu"

          <div class="collapse navbar-collapse" id="menu">

              <li class="nav-item">

            <ul class="navbar-nav">

              </li>
            </ul>

        </div>

      <div class="row align-items-center">

      <div class="social-box">

              <i class="fab fa-linkedin"></i>

              <i class="fab fa-instagram"></i>
